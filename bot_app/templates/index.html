<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nikhil AI | Executive Diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --obsidian: #020408; }
        body { background: radial-gradient(circle at top, #0c1222, var(--obsidian)); color: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .health-board { background: #ffffff; color: #0f172a; border-radius: 28px; width: 95%; max-width: 1050px; height: 72vh; display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.4s ease-out; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 40px; scrollbar-width: none; }
        .fixed-footer { background: #f8fafc; border-top: 1px solid #e2e8f0; padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; }
        .history-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 16px; margin-bottom: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="flex justify-between items-center px-10 py-5 border-b border-white/5 bg-black/20">
        <div class="flex items-center gap-4">
            <div class="w-9 h-9 rounded-lg bg-indigo-600/20 flex items-center justify-center font-black text-indigo-400">N</div>
            <h1 class="text-[10px] font-black tracking-[4px] uppercase text-slate-400">Nikhil AI Diagnostic</h1>
        </div>
        <div class="flex items-center gap-6">
            <span class="text-[11px] font-black text-slate-300 uppercase tracking-widest">{{ request.user.username }}</span>
            <a href="{% url 'logout' %}" class="text-[10px] font-black text-red-500 border border-red-500/20 px-4 py-1.5 rounded-md uppercase">Logout</a>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-80 p-8 border-r border-white/5 bg-black/10 flex flex-col">
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Case History</span>
            <div id="history-list" class="space-y-4 overflow-y-auto">
                {% for item in history %}
                <div class="history-card">
                    <p class="text-[11px] text-slate-300 truncate font-medium">{{ item.query }}</p>
                    <p class="text-[8px] text-slate-600 mt-2 font-mono uppercase">{{ item.timestamp|date:"M d, H:i" }}</p>
                </div>
                {% endfor %}
            </div>
        </aside>

        <main class="flex-1 flex flex-col items-center justify-center p-8">
            <div id="board-container" class="w-full flex justify-center items-center">
                <div class="text-slate-700 text-[10px] font-black tracking-[6px] opacity-20 uppercase">System Idle : Awaiting Clinical Input</div>
            </div>

            <div class="w-full max-w-4xl mt-8">
                <form onsubmit="executeAnalysis(event)" class="flex gap-4 bg-slate-900/60 border border-white/10 p-3 rounded-[28px] shadow-2xl">
                    <input id="u-in" autocomplete="off" type="text" placeholder="Describe symptoms (e.g. fever)..." class="flex-1 bg-transparent px-8 py-4 outline-none text-sm text-white">
                    <button type="submit" class="bg-indigo-600 px-14 py-4 rounded-[20px] font-black text-[11px] text-white uppercase tracking-widest">Analyse</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        async function executeAnalysis(event) {
            event.preventDefault();
            const input = document.getElementById('u-in');
            const board = document.getElementById('board-container');
            const historyList = document.getElementById('history-list');
            const val = input.value.trim(); 
            
            if(!val) return;

            // FIX: Corrected date options to prevent RangeError crash
            const now = new Date();
            const timestamp = now.toLocaleString('en-US', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
            
            // Add to UI history sidebar immediately
            const historyItem = document.createElement('div');
            historyItem.className = 'history-card';
            historyItem.innerHTML = `<p class="text-[11px] text-slate-300 truncate font-medium">${val}</p><p class="text-[8px] text-slate-600 mt-2 font-mono uppercase">${timestamp}</p>`;
            historyList.prepend(historyItem);

            input.value = '';
            board.innerHTML = `<div class="animate-pulse text-indigo-400 text-[10px] font-black tracking-[4px]">CONNECTING TO NEXUS CORE...</div>`;

            try {
                // UPDATED PATH: Matches your urls.py path('api/chat/', ...)
                const response = await fetch(`/api/chat/?text=${encodeURIComponent(val)}`);
                if (!response.ok) throw new Error('Endpoint not found');
                const data = await response.json();

                board.innerHTML = `
                <div class="health-board text-left">
                    <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h2 class="text-xl font-black text-slate-900 tracking-tight">Executive Health Strategy</h2>
                    </div>
                    <div class="content-scroll">
                        <div class="prose prose-slate text-sm text-slate-600">
                            ${data.reply.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                    <div class="fixed-footer">
                        <a href="${data.h_link}" target="_blank" class="bg-indigo-600 text-white text-[10px] px-8 py-3.5 rounded-xl font-black uppercase tracking-widest hover:bg-indigo-700 transition">Nearby Hospitals</a>
                        <a href="${data.p_link}" target="_blank" class="bg-white border border-slate-200 text-slate-900 text-[10px] px-8 py-3.5 rounded-xl font-black uppercase tracking-widest hover:bg-slate-50 transition">Order Medicine</a>
                    </div>
                </div>`;
            } catch (error) {
                board.innerHTML = `<div class="text-red-500 font-black text-[10px]">BACKEND ERROR: Verify Python server is on port 8000.</div>`;
            }
        }
    </script>
</body>
</html>
