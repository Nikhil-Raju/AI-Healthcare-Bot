<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assistant AI | Practitioner Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold italic tracking-tighter"> Health Assistant<span class="text-indigo-500">AI</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-2">Clinical Access Portal</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4 mb-2 block">Medical ID</label>
                <input type="text" name="username" required placeholder="Practitioner Username" 
                    class="w-full bg-slate-900 border border-white/10 rounded-2xl py-4 px-6 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-4 mb-2 block">Security Key</label>
                <input type="password" name="password" required placeholder="••••••••" 
                    class="w-full bg-slate-900 border border-white/10 rounded-2xl py-4 px-6 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            {% if messages %}
                {% for message in messages %}
                    <p class="text-red-400 text-[10px] font-bold text-center uppercase tracking-wider">{{ message }}</p>
                {% endfor %}
            {% endif %}

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-black uppercase text-xs tracking-[0.2em] transition shadow-lg shadow-indigo-500/20">
                Authorize Session
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/5 text-center">
            <p class="text-slate-500 text-xs font-medium">New Practitioner?</p>
            <a href="{% url 'signup' %}" class="inline-block mt-2 text-indigo-400 hover:text-indigo-300 font-bold text-sm transition underline underline-offset-4">
                Create Clinical Account
            </a>
        </div>
    </div>
</body>
</html>
