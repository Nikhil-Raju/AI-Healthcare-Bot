<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-[#020617] h-screen flex items-center justify-center font-sans">
    <div class="bg-white/5 p-12 rounded-[3rem] border border-white/10 w-96 text-center shadow-2xl backdrop-blur-md">
        <h1 class="text-white text-3xl font-black mb-2 tracking-tighter uppercase">Nikhil<span class="text-indigo-500">Login</span></h1>
        <p class="text-indigo-400 text-[10px] font-bold tracking-widest uppercase mb-10">AI Healthcare Assistant</p>
        {% if messages %}{% for m in messages %}<p class="text-red-500 text-[10px] mb-4 font-bold">{{m}}</p>{% endfor %}{% endif %}
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input name="username" placeholder="Medical ID" class="w-full p-4 bg-white/5 rounded-2xl text-white border border-white/10 outline-none focus:border-indigo-500" required>
            <input type="password" name="password" placeholder="Access Key" class="w-full p-4 bg-white/5 rounded-2xl text-white border border-white/10 outline-none focus:border-indigo-500" required>
            <button class="w-full bg-indigo-600 p-4 rounded-2xl text-white font-black text-xs uppercase tracking-widest hover:bg-indigo-500 transition shadow-lg shadow-indigo-500/20">Authorize</button>
        </form>
    </div>
</body>
